version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: sharemeal_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: sharemeal_db
      MYSQL_USER: sharemeal_user
      MYSQL_PASSWORD: sharemeal_password
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: sharemeal_phpmyadmin
    restart: always
    links:
      - db
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      ARBITRARY: 1

volumes:
  mysql_data: